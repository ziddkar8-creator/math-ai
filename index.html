<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Math Genius | Premium Solver</title>
    <style>
        /* --- MODERN UI DESIGN --- */
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #bc4eff;
            --bg-dark: #07080c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background: radial-gradient(circle at 50% -20%, #1e264a, #07080c);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 750px;
            perspective: 1000px;
        }

        /* Glassmorphism Card */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .header p { color: var(--text-dim); font-size: 1rem; }

        /* Input Area */
        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 160px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            color: #fff;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 25px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .solve-btn {
            flex: 2;
            background: linear-gradient(45deg, var(--secondary), var(--accent));
            color: white;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(188, 78, 255, 0.3);
        }

        .solve-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(188, 78, 255, 0.5);
        }

        .solve-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .clear-btn:hover { background: rgba(255, 255, 255, 0.1); }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }

        .dots {
            width: 50px;
            height: 20px;
            display: flex;
            justify-content: space-between;
            margin: 0 auto;
        }

        .dots div {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 0.5s infinite alternate;
        }

        .dots div:nth-child(2) { animation-delay: 0.15s; }
        .dots div:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            to { transform: translateY(-10px); opacity: 0.3; }
        }

        /* Result Area */
        .result-card {
            display: none;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            animation: fadeIn 0.5s ease-in;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .ans-text {
            line-height: 1.8;
            color: #efefef;
            font-size: 1.05rem;
            white-space: pre-wrap;
        }

        .final-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--primary);
            border-radius: 12px;
            color: var(--primary);
            font-weight: bold;
        }

        .copy-btn {
            background: var(--primary);
            color: #000;
            padding: 5px 15px;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            .main-card { padding: 25px; }
            .header h1 { font-size: 2rem; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-card">
            <div class="header">
                <h1>AI Math Genius</h1>
                <p>Advanced Step-by-Step Solver</p>
            </div>

            <div class="input-box">
                <textarea id="questionInput" placeholder="Apna sawaal yahan likhein... (e.g. Find the roots of x^2 + 5x + 6 = 0)"></textarea>
            </div>

            <div class="controls">
                <button class="solve-btn" id="solveBtn" onclick="solveProblem()">
                    <span id="btnLabel">Solve Challenge</span>
                </button>
                <button class="clear-btn" onclick="clearInput()">Clear</button>
            </div>

            <div class="loader" id="loader">
                <div class="dots"><div></div><div></div><div></div></div>
                <p style="margin-top: 10px; color: var(--primary);">Calculating steps...</p>
            </div>

            <div class="result-card" id="resultCard">
                <div class="result-header">
                    <span style="color: var(--primary); font-weight: bold;">SOLUTION</span>
                    <button class="copy-btn" onclick="copyContent()">Copy</button>
                </div>
                <div id="solutionDisplay" class="ans-text"></div>
            </div>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        // APNI API KEY YAHAN DALEIN
        const API_KEY = "AIzaSyDMLpohs0P1wdR6wQ2RfO_dYw7B4Ob2v5o"; 
        
        // Updated URL for Gemini 1.5 Flash
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        async function solveProblem() {
            const question = document.getElementById('questionInput').value.trim();
            const solveBtn = document.getElementById('solveBtn');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const solutionDisplay = document.getElementById('solutionDisplay');

            if (!question) {
                alert("Please write something!");
                return;
            }

            // UI Loading state
            solveBtn.disabled = true;
            document.getElementById('btnLabel').innerText = "Solving...";
            loader.style.display = "block";
            resultCard.style.display = "none";

            const systemInstruction = `You are a professional math tutor.
            Rules:
            1. Detect language: If Hindi/Hinglish -> Answer in Hindi. If English -> Answer in English.
            2. Step-by-Step: Show Given, Formula, Calculation, and Final Answer.
            3. Final Answer: Must be in a clear separate line starting with 'FINAL ANSWER:'.
            4. Be precise and professional.`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ 
                                text: systemInstruction + "\n\nUser Question: " + question 
                            }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                // AI Response Extract
                let aiText = data.candidates[0].content.parts[0].text;
                
                // Formatting for display
                aiText = aiText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                aiText = aiText.replace(/FINAL ANSWER:(.*)/i, '<div class="final-box">Final Answer: $1</div>');

                solutionDisplay.innerHTML = aiText;
                resultCard.style.display = "block";
                
                // Scroll to result
                setTimeout(() => {
                    resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 200);

            } catch (error) {
                console.error(error);
                alert("API Error: " + error.message + "\n\nSolution: Check if your API Key is correct and has access to Gemini 1.5 Flash.");
            } finally {
                solveBtn.disabled = false;
                document.getElementById('btnLabel').innerText = "Solve Challenge";
                loader.style.display = "none";
            }
        }

        function clearInput() {
            document.getElementById('questionInput').value = "";
            document.getElementById('resultCard').style.display = "none";
        }

        function copyContent() {
            const text = document.getElementById('solutionDisplay').innerText;
            navigator.clipboard.writeText(text);
            alert("Solution copied to clipboard!");
        }
    </script>
</body>
  </html>
